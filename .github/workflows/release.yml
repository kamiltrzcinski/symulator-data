name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package data
        run: |
          VERSION=${GITHUB_REF_NAME}
          zip -r symulator-data-${VERSION}.zip data/
      - uses: actions/upload-artifact@v4
        with:
          name: data-package
          path: symulator-data-*.zip

  create-release:
    needs: [package-data]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/data-package/symulator-data-*.zip
