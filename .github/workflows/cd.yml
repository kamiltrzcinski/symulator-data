name: CD

on:
  push:
    branches: [main]
    paths:
      - 'data/**'

jobs:
  build-version:
    runs-on: ubuntu-latest
    outputs:
      version_string: ${{ steps.version.outputs.version_string }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute version string
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          DATE=$(date +%Y%m%d)

          TODAY=$(date +%Y-%m-%d)
          BUILD=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=100" \
            --paginate \
            -q "[.workflow_runs[] | select(.name==\"CD\" and (.created_at | startswith(\"$TODAY\")))] | length")
          BUILD=$((BUILD))

          VERSION_STRING="${VERSION}.${DATE}.${BUILD}"
          TAG="v${VERSION_STRING}"

          echo "version_string=$VERSION_STRING" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Built version: $VERSION_STRING"

  package:
    needs: build-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: trains
            path: data/trains
          - name: vehicles
            path: data/vehicles
          - name: vehicle-types
            path: data/vehicle_types
          - name: schedules
            path: data/schedules
          - name: carriers
            path: data/carriers
    steps:
      - uses: actions/checkout@v4
      - name: Package ${{ matrix.name }}
        run: |
          VERSION_STRING="${{ needs.build-version.outputs.version_string }}"
          FILENAME="${{ matrix.name }}.${VERSION_STRING}.tar.gz"
          tar -czf "$FILENAME" ${{ matrix.path }}
          echo "Packaged: $FILENAME"
      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.name }}
          path: ${{ matrix.name }}.*.tar.gz
          retention-days: 90

  release:
    needs: [build-version, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: pkg-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-version.outputs.tag }}
          name: ${{ needs.build-version.outputs.version_string }}
          body: |
            Automated data release.
            Version: `${{ needs.build-version.outputs.version_string }}`
            Commit: ${{ github.sha }}
          files: artifacts/*.tar.gz
          fail_on_unmatched_files: true
